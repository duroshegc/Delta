// ── ANIMATED CARD STACK ──────────────────────────────────────
function SwipeCard({ profile, onLike, onPass, tweaks, isTop, stackIndex }) {
  const [drag, setDrag] = useState({ x: 0, y: 0, dragging: false });
  const [photoIdx, setPhotoIdx] = useState(0);
  const [exiting, setExiting] = useState(null); // 'like' | 'pass'
  const startRef = useRef(null);

  const THRESHOLD = 80;
  const rotate = drag.x * 0.06;
  const likeOpacity = Math.min(Math.max(drag.x / THRESHOLD, 0), 1);
  const passOpacity = Math.min(Math.max(-drag.x / THRESHOLD, 0), 1);

  const handlePointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY };
    setDrag(d => ({ ...d, dragging: true }));
  };
  const handlePointerMove = (e) => {
    if (!drag.dragging || !startRef.current) return;
    setDrag({ x: e.clientX - startRef.current.x, y: e.clientY - startRef.current.y, dragging: true });
  };
  const handlePointerUp = () => {
    if (!drag.dragging) return;
    if (drag.x > THRESHOLD) triggerLike();
    else if (drag.x < -THRESHOLD) triggerPass();
    else setDrag({ x: 0, y: 0, dragging: false });
  };

  const triggerLike = () => {
    setExiting('like');
    setTimeout(() => { onLike(); setExiting(null); setDrag({ x: 0, y: 0, dragging: false }); }, 350);
  };
  const triggerPass = () => {
    setExiting('pass');
    setTimeout(() => { onPass(); setExiting(null); setDrag({ x: 0, y: 0, dragging: false }); }, 350);
  };

  const tx = exiting === 'like' ? 500 : exiting === 'pass' ? -500 : drag.x;
  const ty = drag.y * 0.3;
  const rot = exiting ? (exiting === 'like' ? 20 : -20) : rotate;
  const scale = isTop ? 1 : 1 - stackIndex * 0.04;
  const translateY = isTop ? 0 : stackIndex * -14;

  return (
    <div
      style={{
        position: 'absolute', inset: 0,
        transform: `translateY(${translateY}px) scale(${scale}) translate(${tx}px, ${ty}px) rotate(${rot}deg)`,
        transition: drag.dragging ? 'none' : 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)',
        cursor: isTop ? 'grab' : 'default',
        touchAction: 'none',
        zIndex: 10 - stackIndex,
        borderRadius: tweaks.cardRadius,
        overflow: 'hidden',
        background: '#fff',
        boxShadow: isTop
          ? '0 24px 48px rgba(0,0,0,0.12), 0 8px 16px rgba(0,0,0,0.07)'
          : '0 8px 24px rgba(0,0,0,0.07)',
      }}
      onPointerDown={handlePointerDown}
      onPointerMove={handlePointerMove}
      onPointerUp={handlePointerUp}
      onPointerLeave={handlePointerUp}
    >
      {/* Photo area */}
      <div style={{ position: 'relative', height: '62%' }}>
        <div style={{ position: 'absolute', inset: 0, background: profile.photos[photoIdx].bg }} />
        
        {/* Photo label placeholder */}
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          flexDirection: 'column', gap: 4,
        }}>
          <div style={{
            width: 56, height: 56, borderRadius: 16,
            background: 'rgba(255,255,255,0.25)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <IconUser size={28} />
          </div>
          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', fontFamily: 'monospace' }}>
            {profile.photos[photoIdx].label}
          </div>
        </div>

        {/* Photo dots */}
        <div style={{
          position: 'absolute', top: 12, left: 0, right: 0,
          display: 'flex', justifyContent: 'center', gap: 5,
        }}>
          {profile.photos.map((_, i) => (
            <div key={i} style={{
              height: 3, borderRadius: 2,
              width: i === photoIdx ? 20 : 10,
              background: i === photoIdx ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.4)',
              transition: 'all 0.2s ease',
            }} />
          ))}
        </div>

        {/* Tap zones */}
        <div style={{ position: 'absolute', inset: 0, display: 'flex' }}>
          <div style={{ flex: 1 }} onClick={() => setPhotoIdx(i => Math.max(0, i - 1))} />
          <div style={{ flex: 1 }} onClick={() => setPhotoIdx(i => Math.min(profile.photos.length - 1, i + 1))} />
        </div>

        {/* Gradient overlay */}
        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0, height: 120,
          background: 'linear-gradient(to top, rgba(0,0,0,0.55), transparent)',
        }} />

        {/* Name + age on photo */}
        <div style={{
          position: 'absolute', bottom: 14, left: 16, right: 16,
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
          <div style={{ fontFamily: 'DM Sans', fontWeight: 700, fontSize: 22, color: '#fff', letterSpacing: -0.3 }}>
            {profile.name}, {profile.age}
          </div>
          {profile.verified && <IconVerified size={18} />}
        </div>

        {/* LIKE / NOPE stamps */}
        <div style={{
          position: 'absolute', top: 24, left: 20,
          padding: '6px 14px', borderRadius: 10,
          border: '2.5px solid #2AC47A', color: '#2AC47A',
          fontFamily: 'DM Sans', fontWeight: 700, fontSize: 22, letterSpacing: 2,
          opacity: drag.x > 0 ? likeOpacity : (exiting === 'like' ? 1 : 0),
          transform: 'rotate(-15deg)',
          transition: 'opacity 0.1s',
        }}>LIKE</div>
        <div style={{
          position: 'absolute', top: 24, right: 20,
          padding: '6px 14px', borderRadius: 10,
          border: '2.5px solid #FF3B5C', color: '#FF3B5C',
          fontFamily: 'DM Sans', fontWeight: 700, fontSize: 22, letterSpacing: 2,
          opacity: drag.x < 0 ? passOpacity : (exiting === 'pass' ? 1 : 0),
          transform: 'rotate(15deg)',
          transition: 'opacity 0.1s',
        }}>NOPE</div>
      </div>

      {/* Card info */}
      <div style={{ padding: '14px 16px 12px', background: '#fff' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span style={{ fontSize: 12, color: '#888', fontFamily: 'DM Sans' }}>{profile.distance} · {profile.job}</span>
          {/* Compat badge */}
          <div style={{
            marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 4,
            background: tweaks.accentSoft, borderRadius: 20,
            padding: '3px 10px',
          }}>
            <IconDelta size={12} color={tweaks.accent} />
            <span style={{ fontSize: 12, fontWeight: 600, color: tweaks.accent, fontFamily: 'DM Sans' }}>{profile.compat}% match</span>
          </div>
        </div>

        {/* Tags */}
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
          {profile.tags.map(t => (
            <span key={t} style={{
              padding: '4px 10px', borderRadius: 20,
              background: '#F4F4F4', fontSize: 11,
              color: '#444', fontFamily: 'DM Sans', fontWeight: 500,
            }}>{t}</span>
          ))}
        </div>

        {/* Prompt */}
        <div style={{
          background: '#FAFAFA', borderRadius: 14, padding: '10px 12px',
        }}>
          <div style={{ fontSize: 10, color: '#999', fontFamily: 'DM Sans', marginBottom: 3, letterSpacing: 0.3 }}>
            {profile.prompt.toUpperCase()}
          </div>
          <div style={{ fontSize: 13, color: '#222', fontFamily: 'DM Sans', lineHeight: 1.45 }}>
            "{profile.answer}"
          </div>
        </div>
      </div>
    </div>
  );
}

// 2. DISCOVER (Swipe)
function DiscoverScreen({ onOpenProfile, tweaks }) {
  const [profileIdx, setProfileIdx] = useState(0);
  const [liked, setLiked] = useState(false);
  const [matchAnim, setMatchAnim] = useState(false);

  const current = profiles[profileIdx % profiles.length];
  const next = profiles[(profileIdx + 1) % profiles.length];

  const handleLike = () => {
    if (profileIdx % 2 === 0) { setMatchAnim(true); setTimeout(() => setMatchAnim(false), 2000); }
    setProfileIdx(i => i + 1);
    setLiked(false);
  };
  const handlePass = () => { setProfileIdx(i => i + 1); setLiked(false); };

  return (
    <div style={{ height: '100%', background: tweaks.bgColor, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '60px 20px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <IconDelta size={22} color={tweaks.accent} />
          <span style={{ fontFamily: 'DM Sans', fontWeight: 700, fontSize: 20, letterSpacing: -0.5 }}>delta</span>
        </div>
        <button style={{
          background: tweaks.accentSoft, border: 'none', borderRadius: 14,
          padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 6,
          cursor: 'pointer',
        }}>
          <IconSearch size={15} />
          <span style={{ fontFamily: 'DM Sans', fontSize: 13, fontWeight: 500, color: tweaks.accent }}>Filters</span>
        </button>
      </div>

      {/* Card stack */}
      <div style={{ flex: 1, position: 'relative', margin: '0 16px' }}>
        <SwipeCard profile={next} onLike={()=>{}} onPass={()=>{}} tweaks={tweaks} isTop={false} stackIndex={1} />
        <SwipeCard key={current.id} profile={current} onLike={handleLike} onPass={handlePass} tweaks={tweaks} isTop={true} stackIndex={0} />
      </div>

      {/* Action buttons */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        gap: 16, padding: '14px 20px 20px',
      }}>
        {[
          { icon: <IconX size={22} />, bg: '#fff', color: '#FF3B5C', shadow: '0 4px 16px rgba(255,59,92,0.18)', action: handlePass, size: 52 },
          { icon: <IconStar size={20} />, bg: '#fff', color: '#FFD60A', shadow: '0 4px 16px rgba(255,214,10,0.2)', action: ()=>{}, size: 46 },
          { icon: <IconHeart filled={liked} size={24} color="#fff" />, bg: `linear-gradient(135deg, ${tweaks.accent}, oklch(55% 0.18 160))`, color: '#fff', shadow: `0 8px 24px ${tweaks.accent}40`, action: handleLike, size: 60 },
          { icon: <IconMsg size={20} />, bg: '#fff', color: '#0A84FF', shadow: '0 4px 16px rgba(10,132,255,0.18)', action: ()=>{}, size: 46 },
        ].map((btn, i) => (
          <button key={i} onClick={btn.action} style={{
            width: btn.size, height: btn.size, borderRadius: '50%',
            background: btn.bg, border: 'none',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: btn.color, cursor: 'pointer',
            boxShadow: btn.shadow,
            transition: 'transform 0.15s ease',
          }}
          onMouseDown={e => e.currentTarget.style.transform = 'scale(0.92)'}
          onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
          >{btn.icon}</button>
        ))}
      </div>

      {/* Match overlay */}
      {matchAnim && (

}

function AppDevice({ screenKey, tweaks, children, label }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16 }}>
      <IOSDevice width={350} height={758} dark={false}>
        <div style={{ position: 'relative', height: '100%', overflow: 'hidden' }}>
          {children}
        </div>
      </IOSDevice>
      <div style={{
        fontFamily: 'DM Sans', fontWeight: 600, fontSize: 13,
        color: '#666', letterSpacing: 0.2,
      }}>{label}</div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
function App() {
  const { tweaks, TweaksPanel, TweakSection, TweakColor, TweakToggle, TweakSlider, TweakSelect } = useTweaks(TWEAK_DEFAULTS);
  const [activeProfile, setActiveProfile] = useState(profiles[0]);

  return (
    <div style={{
      width: '100vw', height: '100vh',
      background: 'linear-gradient(145deg, #F7F7F5, #EDEDEA)',
      overflow: 'auto',
      position: 'relative',
    }}>
      {/* Title */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 50,
        padding: '20px 40px 16px',
        background: 'rgba(247,247,245,0.85)',
        backdropFilter: 'blur(12px)',
        display: 'flex', alignItems: 'center', gap: 14,
        borderBottom: '1px solid rgba(0,0,0,0.07)',
      }}>
        <IconDelta size={28} color={tweaks.accent} />
        <div>
          <div style={{ fontFamily: 'DM Sans', fontWeight: 700, fontSize: 20, letterSpacing: -0.5, color: '#111' }}>Delta</div>
          <div style={{ fontFamily: 'DM Sans', fontSize: 12, color: '#999' }}>Dating App · UI Exploration</div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 10 }}>
          {['Light & Airy', 'Apple-style', 'Animated'].map(tag => (
            <span key={tag} style={{
              padding: '4px 12px', borderRadius: 20,
              background: tweaks.accentSoft, color: tweaks.accent,
              fontFamily: 'DM Sans', fontSize: 11, fontWeight: 600,
            }}>{tag}</span>
          ))}
        </div>
      </div>

      {/* Frames row */}
      <div style={{
        display: 'flex', gap: 36, padding: '40px 40px 60px',
        justifyContent: 'center', flexWrap: 'wrap', alignItems: 'flex-start',
      }}>
        <AppDevice label="01 — Welcome" tweaks={tweaks}>
          <WelcomeScreen onNext={() => {}} tweaks={tweaks} />
        </AppDevice>

        <AppDevice label="02 — Discover" tweaks={tweaks}>
          <DiscoverScreen onOpenProfile={setActiveProfile} tweaks={tweaks} />
        </AppDevice>

        <AppDevice label="03 — Profile Detail" tweaks={tweaks}>
          <ProfileScreen profile={activeProfile} onBack={() => {}} tweaks={tweaks} />
        </AppDevice>

        <AppDevice label="04 — Messages" tweaks={tweaks}>
          <MatchesScreen tweaks={tweaks} />
        </AppDevice>

        <AppDevice label="05 — Chat" tweaks={tweaks}>
          <ChatScreen profile={profiles[0]} tweaks={tweaks} />
        </AppDevice>

        <AppDevice label="06 — My Profile" tweaks={tweaks}>
          <MyProfileScreen tweaks={tweaks} />
        </AppDevice>
      </div>

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection title="Brand">
          <TweakColor id="accent" label="Accent color" />
          <TweakColor id="accentSoft" label="Accent tint" />
          <TweakColor id="bgColor" label="Background" />
        </TweakSection>
        <TweakSection title="Cards">
          <TweakSlider id="cardRadius" label="Card radius" min={12} max={40} step={2} />
          <TweakSlider id="fontScale" label="Type scale" min={0.8} max={1.3} step={0.05} />
        </TweakSection>
        <TweakSection title="UI">
          <TweakToggle id="showLabels" label="Show nav labels" />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

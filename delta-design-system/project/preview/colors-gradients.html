<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A0F; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; gap: 12px; }
  .card { flex: 1; border-radius: 14px; height: 80px; display: flex; align-items: flex-end; padding: 12px 16px; position: relative; overflow: hidden; }
  .tag { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .sub { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 2px; }
</style>
</head>
<body>
  <div class="card" style="background: linear-gradient(135deg, #EC4899 0%, #F97316 100%); box-shadow: 0 8px 24px rgba(236,72,153,0.4);">
    <div><div class="tag">Brand</div><div class="sub">Pink → Orange</div></div>
  </div>
  <div class="card" style="background: linear-gradient(135deg, #00D4AA 0%, #EC4899 100%); box-shadow: 0 8px 24px rgba(0,212,170,0.3);">
    <div><div class="tag">Live</div><div class="sub">Teal → Pink</div></div>
  </div>
  <div class="card" style="background: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%); box-shadow: 0 8px 24px rgba(245,158,11,0.3);">
    <div><div class="tag">delt</div><div class="sub">Gold → Red</div></div>
  </div>
  <div class="card" style="background: linear-gradient(180deg, #13131A 0%, #0A0A0F 100%); border: 1px solid #28283A;">
    <div><div class="tag" style="color:#A0A0B8;">Dark</div><div class="sub" style="color:#5C5C78;">Surface → Black</div></div>
  </div>
</body>
</html>

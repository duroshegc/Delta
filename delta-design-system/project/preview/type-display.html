<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A0F; font-family: 'DM Sans', sans-serif; padding: 28px 32px; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
  .headline { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 40px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.1; }
  .gradient-text {
    background: linear-gradient(135deg, #EC4899, #F97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub { font-family: 'DM Sans', sans-serif; font-size: 15px; color: #A0A0B8; line-height: 1.55; max-width: 380px; }
  .tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(236,72,153,0.12); border: 1px solid rgba(236,72,153,0.25); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 500; color: #F97316; letter-spacing: 0.04em; margin-bottom: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #EC4899; }
</style>
</head>
<body>
  <div class="tag"><span class="dot"></span> Display type · Plus Jakarta Sans 800</div>
  <div class="headline">
    <span style="color:#F8F8FC;">Find your</span><br>
    <span class="gradient-text">connection.</span>
  </div>
  <div class="sub">Date, discover, and connect live with people who match your vibe.</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A0F; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
  .group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
  .label { font-size: 10px; font-weight: 500; color: #5C5C78; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .chip { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; }
  .info .name { font-size: 11px; font-weight: 500; color: #F8F8FC; }
  .info .desc { font-size: 10px; color: #5C5C78; }
</style>
</head>
<body>
  <div class="group">
    <div class="label">Success</div>
    <div class="row">
      <div class="chip" style="background:#22C55E;"></div>
      <div class="info"><div class="name">success</div><div class="desc">#22C55E</div></div>
    </div>
    <div class="row">
      <div class="chip" style="background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.2);"></div>
      <div class="info"><div class="name">success-bg</div><div class="desc">12% opacity</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Danger</div>
    <div class="row">
      <div class="chip" style="background:#EF4444;"></div>
      <div class="info"><div class="name">danger</div><div class="desc">#EF4444</div></div>
    </div>
    <div class="row">
      <div class="chip" style="background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.2);"></div>
      <div class="info"><div class="name">danger-bg</div><div class="desc">12% opacity</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Warning</div>
    <div class="row">
      <div class="chip" style="background:#F59E0B;"></div>
      <div class="info"><div class="name">warning</div><div class="desc">#F59E0B</div></div>
    </div>
    <div class="row">
      <div class="chip" style="background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.2);"></div>
      <div class="info"><div class="name">warning-bg</div><div class="desc">12% opacity</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Info</div>
    <div class="row">
      <div class="chip" style="background:#3B82F6;"></div>
      <div class="info"><div class="name">info</div><div class="desc">#3B82F6</div></div>
    </div>
    <div class="row">
      <div class="chip" style="background:rgba(59,130,246,0.12); border:1px solid rgba(59,130,246,0.2);"></div>
      <div class="info"><div class="name">info-bg</div><div class="desc">12% opacity</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">States</div>
    <div class="row">
      <div class="chip" style="background:#EC4899; opacity:0.35;"></div>
      <div class="info"><div class="name">disabled</div><div class="desc">35% opacity</div></div>
    </div>
    <div class="row">
      <div class="chip" style="background:#EC4899; opacity:0.85;"></div>
      <div class="info"><div class="name">hover</div><div class="desc">85% opacity</div></div>
    </div>
    <div class="row">
      <div class="chip" style="background:#C4306A;"></div>
      <div class="info"><div class="name">pressed</div><div class="desc">#C4306A</div></div>
    </div>
  </div>
</body>
</html>

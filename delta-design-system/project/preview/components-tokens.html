<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A0F; font-family: 'DM Sans', sans-serif; padding: 20px 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .label { font-size: 10px; font-weight: 500; color: #5C5C78; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

  /* Wallet balance widget */
  .wallet {
    background: #13131A;
    border: 1px solid #28283A;
    border-radius: 20px;
    padding: 20px;
    width: 200px;
    position: relative;
    overflow: hidden;
  }
  .wallet::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
  }
  .wallet-label { font-size: 11px; color: #5C5C78; font-weight: 500; letter-spacing: 0.04em; }
  .wallet-icon { font-size: 22px; margin-bottom: 4px; }
  .wallet-balance { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: #F8F8FC; letter-spacing: -0.02em; line-height: 1.1; margin: 6px 0; }
  .wallet-unit { font-size: 14px; color: #F59E0B; font-weight: 600; margin-left: 2px; }
  .wallet-sub { font-size: 11px; color: #5C5C78; }
  .wallet-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 14px;
    background: linear-gradient(135deg, #F59E0B, #EF4444);
    border: none; border-radius: 10px; padding: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    color: #fff; cursor: pointer; width: 100%;
    box-shadow: 0 4px 12px rgba(245,158,11,0.3);
  }

  /* Token pack cards */
  .pack-grid { display: flex; flex-direction: column; gap: 8px; width: 180px; }
  .pack {
    background: #13131A;
    border: 1px solid #28283A;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    transition: border-color 150ms;
  }
  .pack:hover { border-color: rgba(245,158,11,0.4); }
  .pack-popular {
    border-color: rgba(245,158,11,0.35);
    box-shadow: 0 0 12px rgba(245,158,11,0.15);
  }
  .pack-left {}
  .pack-amount { font-size: 16px; font-weight: 700; color: #F8F8FC; }
  .pack-unit { font-size: 11px; color: #F59E0B; font-weight: 600; }
  .pack-bonus { font-size: 10px; color: #22C55E; }
  .pack-price { font-size: 14px; font-weight: 600; color: #A0A0B8; }
  .pack-tag { font-size: 9px; background: linear-gradient(135deg,#F59E0B,#EF4444); color: #fff; border-radius: 4px; padding: 2px 6px; font-weight: 600; }

  /* Spending meter */
  .spending { background: #13131A; border: 1px solid #28283A; border-radius: 14px; padding: 14px 16px; width: 180px; }
  .spend-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .spend-name { font-size: 12px; color: #A0A0B8; }
  .spend-val { font-size: 12px; color: #F59E0B; font-weight: 500; }
  .spend-bar { height: 4px; background: #1E1E2A; border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .spend-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #F59E0B, #EF4444); }
</style>
</head>
<body>
  <!-- Wallet widget -->
  <div>
    <div class="label">delt Wallet</div>
    <div class="wallet">
      <div class="wallet-label">Your delt balance</div>
      <div class="wallet-balance">248<span class="wallet-unit">delt</span></div>
      <div class="wallet-sub">≈ 41 live minutes</div>
      <button class="wallet-btn">+ Buy delt</button>
    </div>
  </div>

  <!-- Token packs -->
  <div>
    <div class="label">Token Packs</div>
    <div class="pack-grid">
      <div class="pack">
        <div class="pack-left">
          <div class="pack-amount">50 <span class="pack-unit">delt</span></div>
          <div class="pack-bonus">&nbsp;</div>
        </div>
        <div class="pack-price">$0.99</div>
      </div>
      <div class="pack pack-popular">
        <div class="pack-left">
          <div class="pack-amount">200 <span class="pack-unit">delt</span></div>
          <div class="pack-bonus">+20 bonus</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div class="pack-price">$2.99</div>
          <div class="pack-tag">POPULAR</div>
        </div>
      </div>
      <div class="pack">
        <div class="pack-left">
          <div class="pack-amount">500 <span class="pack-unit">delt</span></div>
          <div class="pack-bonus">+80 bonus</div>
        </div>
        <div class="pack-price">$5.99</div>
      </div>
    </div>
  </div>

  <!-- Spending breakdown -->
  <div>
    <div class="label">Spending</div>
    <div class="spending">
      <div class="spend-row"><span class="spend-name">Live minutes</span><span class="spend-val">120 delt</span></div>
      <div class="spend-bar"><div class="spend-fill" style="width:60%;"></div></div>
      <div class="spend-row"><span class="spend-name">Priority match</span><span class="spend-val">48 delt</span></div>
      <div class="spend-bar"><div class="spend-fill" style="width:24%;"></div></div>
      <div class="spend-row"><span class="spend-name">Boosts</span><span class="spend-val">30 delt</span></div>
      <div class="spend-bar"><div class="spend-fill" style="width:15%;"></div></div>
    </div>
  </div>
</body>
</html>
